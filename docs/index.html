  <!-- APEX: unregister stale service workers + purge caches on load (fix stale cache issues) -->
  <script id="apex_sw_cleanup">
    (function() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          for (var r of regs) {
            r.unregister().then(function(ok) {
              if (ok) console.log('[APEX] Unregistered stale service worker');
            });
          }
        }).catch(function(e) { console.warn('[APEX] SW cleanup failed:', e); });
      }
      if (window.caches && caches.keys) {
        caches.keys().then(function(keys) {
          for (var k of keys) {
            caches.delete(k).then(function(ok) {
              if (ok) console.log('[APEX] Deleted cache:', k);
            });
          }
        }).catch(function(e) { console.warn('[APEX] cache cleanup failed:', e); });
      }
    })();
  </script>

  <!-- APEX Pre-redirect (v6.5.3): auth-disabled build — no forced redirects.
       The app's GoRouter already redirects /login → /app, so the old
       JS-level hash override was silently discarding the user's target
       route (e.g. #/clients → #/login → #/app). Now: only the "already
       logged-in and sitting on /login" case still redirects to home. -->
  <script id="apex_pre_redirect">
    (function() {
      var token = localStorage.getItem('apex_token');
      var hash = window.location.hash || '';
      if (token && token.length > 10) {
        if (hash === '#/login') {
          window.location.hash = '#/home';
        }
      }
    })();
  </script>

  <!-- APEX PWA install prompt capture + standalone detection -->
  <script id="apex_pwa_install">
    (function() {
      window.__APEX_PWA__ = {
        installEvent: null,
        canInstall: false,
        isStandalone: window.matchMedia('(display-mode: standalone)').matches ||
                      window.navigator.standalone === true,
        promptInstall: function() {
          if (!this.installEvent) return false;
          this.installEvent.prompt();
          this.installEvent.userChoice.then(function(choice) {
            console.log('[APEX] PWA install choice:', choice.outcome);
            window.__APEX_PWA__.installEvent = null;
            window.__APEX_PWA__.canInstall = false;
            window.dispatchEvent(new Event('apex:pwa-changed'));
          });
          return true;
        }
      };
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__APEX_PWA__.installEvent = e;
        window.__APEX_PWA__.canInstall = true;
        window.dispatchEvent(new Event('apex:pwa-changed'));
        console.log('[APEX] PWA install prompt ready');
      });
      window.addEventListener('appinstalled', function() {
        window.__APEX_PWA__.installEvent = null;
        window.__APEX_PWA__.canInstall = false;
        window.__APEX_PWA__.isStandalone = true;
        window.dispatchEvent(new Event('apex:pwa-changed'));
        console.log('[APEX] PWA installed');
      });
      // APEX: function-style accessors for Dart js_util.callMethod
      // (Dart side calls window.apexCanInstall() / apexIsStandalone() as functions)
      window.apexCanInstall = function() {
        return !!(window.__APEX_PWA__ && window.__APEX_PWA__.canInstall);
      };
      window.apexIsStandalone = function() {
        return !!(window.__APEX_PWA__ && window.__APEX_PWA__.isStandalone);
      };
      window.apexPromptInstall = function() {
        return window.__APEX_PWA__ ? window.__APEX_PWA__.promptInstall() : false;
      };
    })();
  </script>
