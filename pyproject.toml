[tool.black]
line-length = 120
target-version = ["py311"]

[tool.ruff]
line-length = 120
target-version = "py311"
select = ["E9", "F63", "F7", "F82"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.coverage.run]
source = ["app"]
omit = ["app/*/models/*", "tests/*"]

[tool.coverage.report]
show_missing = true
fail_under = 10
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.",
    "pass",
]
