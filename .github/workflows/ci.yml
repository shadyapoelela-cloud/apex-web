name: APEX CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  JWT_SECRET: ci-test-secret-key-not-for-production
  ADMIN_SECRET: ci-admin-secret
  DATABASE_URL: sqlite:///./ci_test.db
  ANTHROPIC_API_KEY: sk-ant-fake-key-for-ci

jobs:
  lint:
    name: Lint & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lint tools
        run: pip install black bandit ruff

      - name: Black format check
        run: black --check --diff --line-length 120 app/ tests/ || echo "::warning::Black formatting issues found (non-blocking)"

      - name: Ruff lint check
        run: ruff check app/ --select E9,F63,F7,F82 --no-fix || echo "::warning::Ruff found issues (non-blocking)"

      - name: Bandit security scan
        run: bandit -r app/ -ll -q --skip B101,B311 -f txt || echo "::warning::Bandit found issues (non-blocking)"

      - name: Dependency CVE scan (pip-audit)
        # Install the real runtime requirements so pip-audit sees the
        # exact versions we ship, not just tooling. --desc makes
        # findings greppable in the Actions log. Non-blocking for now
        # (we just patched 4 CVEs in 317d369 — flip to blocking once
        # we've had a week without new findings on main).
        run: |
          pip install pip-audit
          pip install -r requirements.txt
          pip-audit --desc --progress-spinner=off \
            || echo "::warning::pip-audit found vulnerabilities (non-blocking — investigate)"

      - name: Syntax check all Python files
        run: |
          echo "Running py_compile on all .py files under app/..."
          find app/ -name "*.py" -print0 | xargs -0 -n1 python -m py_compile
          echo "All files compiled successfully."

      - name: V5 Routing — pin shape/chip-id check (regex)
        # Fast pure-Python guard against the 4 routing bugs found in
        # UAT_FORENSIC_FULL_2026-05-06.md: pins pointing at non-existent
        # chips, and `/app/erp/app/erp/...` double-prefix typos. Runs
        # without a Flutter toolchain so it gates every PR. The deeper
        # runtime check (chip-in-correct-main-module + reachability
        # ratchet) lives in `apex_finance/test/v5_routing_test.dart`.
        run: python scripts/dev/repro_routing_bugs.py

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # G-T1.10 (Sprint 13): full history required so diff-cover can
          # resolve `origin/main` for the PR-diff coverage gate (step
          # below). Default fetch-depth=1 left only the PR's head commit
          # locally; diff-cover failed with "Could not find the branch
          # to compare to". The lint job's checkout doesn't need this —
          # Black/Ruff/Bandit/pip-audit operate on the working tree.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx pytest-cov alembic "diff-cover>=8.0"

      - name: Run tests with coverage
        # NOTE on --cov-fail-under: measured at 60.9% locally on
        # 2026-04-24 after fixing the 12 flake-by-state tests
        # (commit 767d48e). Gate set at 55 to catch real regressions
        # while leaving a ~6pp buffer for fluctuation from added
        # routes/modules between coverage-adding test PRs. Raise it
        # to ~58 once we formalise the sub-coverage per phase.
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=html:coverage_html \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=55 \
            --tb=short

      - name: PR-diff coverage gate
        # Phase 2 of G-PROC-1: enforce 70% coverage on lines added by PR.
        # Bypass via 'skip-coverage-gate' label (use sparingly).
        #
        # Diff-cover scoped to app/** (Python) until G-T1.1 unblocks Flutter
        # widget tests. When G-T1.1 ships, expand --include to apex_finance/lib/**.
        # TODO: link this scope expansion to G-T1.1 closure.
        # Tracking: APEX_BLUEPRINT/09 § 4 G-T1.1
        #
        # 2-week effectiveness review: 2026-05-15. If label-spam >30%,
        # revisit threshold or add small-PR exemption (G-PROC-1.3).
        if: github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'skip-coverage-gate')
        run: |
          diff-cover coverage.xml \
            --compare-branch=origin/main \
            --include 'app/**' \
            --fail-under=70

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage_html/
          retention-days: 14

      - name: Verify major module imports
        run: |
          python -c "
          import sys
          errors = []

          modules = [
              ('app.main', 'FastAPI app entry point'),
              ('app.phase1.models.platform_models', 'Phase 1 models'),
              ('app.phase2.models.phase2_models', 'Phase 2 models'),
              ('app.phase2.models.onboarding_models', 'Onboarding models'),
              ('app.phase2.models.archive_models', 'Archive models'),
              ('app.phase2.models.service_catalog_models', 'Service catalog models'),
              ('app.phase3.models.phase3_models', 'Phase 3 models'),
              ('app.phase4.models.phase4_models', 'Phase 4 models'),
              ('app.phase4.services.provider_service', 'Provider service'),
              ('app.core', 'Core module'),
              ('app.core.auth_utils', 'Auth utils'),
              ('app.core.email_service', 'Email service'),
          ]

          for mod, desc in modules:
              try:
                  __import__(mod)
                  print(f'  OK: {desc} ({mod})')
              except Exception as e:
                  errors.append(f'{desc} ({mod}): {e}')
                  print(f'  WARN: {desc} ({mod}) - {e}')

          if errors:
              print(f'\n{len(errors)} import(s) failed (non-fatal):')
              for err in errors:
                  print(f'  - {err}')
          else:
              print('\nAll imports passed.')
          "

  flutter-routing:
    name: V5 Routing Validation (Flutter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          # G-WEB-BUILD-4 (2026-05-07): pinned to 3.27.4 (= local dev SDK)
          # because newer Flutter ships Dart 3.7+ which fails const
          # evaluation on google_fonts 6.3.0 (FontWeight as Map key
          # without primitive `==`). Bump this in lockstep with a
          # google_fonts upgrade — neither alone.
          channel: stable
          flutter-version: '3.27.4'
          cache: true

      - name: Install Flutter dependencies
        working-directory: apex_finance
        run: flutter pub get

      - name: Run V5 routing tests
        # Guards against:
        # - Quick Access pins resolving to a non-existent chip
        # - /app/erp/app/erp/... double-prefix bugs
        # - Unreachable chip count growing above the documented baseline
        # See UAT_FORENSIC_FULL_2026-05-06.md.
        working-directory: apex_finance
        run: flutter test test/v5_routing_test.dart --reporter expanded

  pages-deploy:
    # G-WEB-BUILD-1 (Sprint 16, 2026-05-07): build the Flutter web bundle
    # on every main push and force-push the result to the `gh-pages`
    # branch. main history stays clean — bundle commits never land
    # there. Replaces the previous workflow of ad-hoc manual rebuilds
    # which left apex-web/main.dart.js stale by 5 PRs (b127858 →
    # 03cca47). See PROGRESS.md G-WEB-BUILD-1 entry.
    name: Build and deploy Flutter web to gh-pages
    needs: [lint, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      # Only used by peaceiris/actions-gh-pages to push to the
      # gh-pages branch. main is never written to by this job.
      contents: write
    concurrency:
      group: pages-deploy
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          # G-WEB-BUILD-4 (2026-05-07): pinned to 3.27.4 (= local dev SDK)
          # because newer Flutter ships Dart 3.7+ which fails const
          # evaluation on google_fonts 6.3.0 (FontWeight as Map key
          # without primitive `==`). Bump this in lockstep with a
          # google_fonts upgrade — neither alone.
          channel: stable
          flutter-version: '3.27.4'
          cache: true

      - name: Build web bundle
        working-directory: apex_finance
        run: |
          flutter pub get
          flutter build web \
            --release \
            --no-tree-shake-icons \
            --base-href "/apex-web/" \
            --dart-define=API_BASE=https://apex-api-ootk.onrender.com

      - name: Smoke test bundle
        # Refuse to publish broken builds. Catches:
        # - missing main.dart.js
        # - absurdly small bundle (compile silently produced empty output)
        # - chip-class regression (recently-wired chip keys missing —
        #   means the wiring was tree-shaken or v5_wired_screens.dart
        #   broke during the build)
        run: |
          set -euo pipefail
          test -f apex_finance/build/web/main.dart.js
          SIZE=$(stat -c%s apex_finance/build/web/main.dart.js)
          if [ "$SIZE" -lt 1000000 ]; then
            echo "::error::main.dart.js too small ($SIZE bytes) — likely broken build"
            exit 1
          fi
          for chip in receipt-capture ar-aging ap-aging vat-return tax-calendar; do
            if ! grep -q "erp/finance/$chip" apex_finance/build/web/main.dart.js; then
              echo "::error::Recently-wired chip '$chip' not found in bundle — wiring regression"
              exit 1
            fi
          done
          echo "Bundle smoke test passed: ${SIZE} bytes, all checked chips present"

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apex_finance/build/web
          publish_branch: gh-pages
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: |
            deploy: ${{ github.event.head_commit.message }}

            Built from ${{ github.sha }}

  deploy:
    name: Deploy to Render
    needs: [lint, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy
        run: |
          curl -sf "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" || echo "Deploy hook not configured"
